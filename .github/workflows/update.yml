name: Update disposable domains list

# Pulls the latest list from the canonical source daily and commits it if
# it changed. Scheduled just after the source's nightly self-learning
# harvest (02:30 UTC) so the repo tracks the freshest data.

on:
  schedule:
    - cron: '30 3 * * *' # daily, 03:30 UTC
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch latest list
        run: |
          curl -fsS --retry 3 --max-time 120 \
            https://www.validemailchecker.com/disposable-email-domains.txt \
            -o data/domains.new

          lines=$(wc -l < data/domains.new)
          echo "Fetched $lines domains."

          # Safety guard: never overwrite the committed list with a truncated
          # or error response. The list should only ever grow modestly.
          if [ "$lines" -lt 100000 ]; then
            echo "::error::Refusing to commit — only $lines lines (expected 100k+). Source may be down."
            exit 1
          fi
          mv data/domains.new data/domains.txt

      - name: Commit if changed
        run: |
          if git diff --quiet -- data/domains.txt; then
            echo "No changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/domains.txt
          git commit -m "chore: daily disposable list update ($(wc -l < data/domains.txt) domains)"
          git push
